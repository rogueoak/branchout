# Caddy edge proxy stack. The only stack that publishes host ports 80/443.
# Caddy terminates TLS, issues ACME certificates, and routes by path to
# the app services (web/control-plane/game-engine) on the shared external
# `edge` network. ACME data persists in the `caddy_data` named volume.
#
# Bring up:
#   docker network create edge  # idempotent; deploy job does this
#   docker compose -f deploy/docker/compose.proxy.yml up -d --wait
name: proxy

services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp' # HTTP/3 (QUIC)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data # ACME certs + keys; must survive redeploys
      - caddy_config:/config
    networks:
      - edge
    healthcheck:
      # Hit the local admin API (bound to 127.0.0.1:2019 inside the container),
      # which only answers once Caddy is actually running and serving - a truer
      # signal than `caddy version`, which passes even if the server never came up.
      # busybox wget ships in the alpine image.
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:2019/config/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  caddy_data: # ACME certificate storage; back this up
  caddy_config:

# Created externally by the deploy job (idempotent): `docker network create edge`.
# All app services that Caddy proxies must also join this network.
networks:
  edge:
    external: true
