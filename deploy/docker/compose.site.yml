# Branch out app stack. Runs the three private GHCR images plus Postgres and
# Redis. No host ports are published: Caddy reaches the app services as
# web:3000 / control-plane:4000 / game-engine:4001 over the external `edge`
# network. Postgres and Redis are on the internal-only `db` network; they
# are not reachable from the host or from Caddy.
#
# Deploy is zero-downtime via docker-rollout (spec 0034), ONE app service at a
# time - control-plane, then game-engine, then web - so the small droplet never
# runs the whole stack twice. Postgres and Redis are never rolled (stateful, one
# volume). Rolling one service must not recreate its `depends_on` neighbours:
# docker-rollout scales with `--no-deps`, and the rehearsal asserts no dependency
# container churns. CD pins IMAGE_TAG to the sha-<full> tag built in that run:
#   IMAGE_TAG=sha-<commit> docker compose -f deploy/docker/compose.site.yml pull
#   IMAGE_TAG=sha-<commit> docker compose -f deploy/docker/compose.site.yml up -d --no-recreate postgres redis
#   IMAGE_TAG=sha-<commit> docker rollout -f deploy/docker/compose.site.yml control-plane
#   IMAGE_TAG=sha-<commit> docker rollout -f deploy/docker/compose.site.yml game-engine
#   IMAGE_TAG=sha-<commit> docker rollout -f deploy/docker/compose.site.yml web
#
# Secrets come from a host-side env_file the deploy job writes next to this
# compose file as deploy/docker/.env.prod (mode 0600). `env_file: .env.prod`
# is resolved relative to THIS file's directory, so it must live alongside it.
# Required keys: POSTGRES_PASSWORD, SESSION_SECRET
# Optional (spec 0004/0006): DATABASE_URL, REDIS_URL, INTERNAL_TOKEN
name: branchout

services:
  web:
    image: ghcr.io/rogueoak/branchout/web:${IMAGE_TAG:-latest}
    # No container_name: docker-rollout (spec 0034) runs two Compose-indexed
    # instances (branchout-web-1 / -2) during a rollout, so a fixed name blocks the
    # overlap. The service keeps its `web` network alias; Caddy resolves it via Docker
    # DNS to whichever instances are live.
    restart: unless-stopped
    # Memory cap for the brief double-up: sized well above the real SSR footprint so it
    # never trips in normal operation and only bounds a runaway/leak while two web
    # instances overlap during a rollout. The host must fit baseline + one extra app
    # instance + Postgres/Redis + headroom + swap (see overview/architecture.md).
    mem_limit: 400m
    mem_reservation: 192m
    expose:
      - '3000'
    env_file: .env.prod
    environment:
      NODE_ENV: production
    healthcheck:
      # curl is installed in the Dockerfile for this check. /health is the Next.js health route.
      test: ['CMD-SHELL', 'curl -fsS http://localhost:3000/health -o /dev/null || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      # web makes server-side (SSR) calls to control-plane; wait for it to be healthy.
      control-plane:
        condition: service_healthy
    networks:
      # edge only: web reaches control-plane over `edge` (Caddy is here too).
      # It has no business talking to Postgres/Redis directly, so it stays off `db`.
      - edge

  control-plane:
    image: ghcr.io/rogueoak/branchout/control-plane:${IMAGE_TAG:-latest}
    # No container_name (see web): docker-rollout runs two indexed instances during a
    # rollout; the `control-plane` alias is what web (SSR) and Caddy (/api) resolve.
    restart: unless-stopped
    # Memory cap for the rollout double-up (see web); a Fastify service is lighter than
    # the SSR web tier, so a smaller ceiling still sits well above its real footprint.
    mem_limit: 300m
    mem_reservation: 128m
    expose:
      - '4000'
    env_file: .env.prod
    environment:
      NODE_ENV: production
      # The engine is a separate container on `edge`; reach it by service name (the config
      # default is localhost, which would hit the control-plane's own port in a split deploy).
      ENGINE_URL: http://game-engine:4001
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:4000/health -o /dev/null || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - edge
      - db

  game-engine:
    image: ghcr.io/rogueoak/branchout/game-engine:${IMAGE_TAG:-latest}
    # No container_name (see web): docker-rollout runs two indexed instances during a
    # rollout; the `game-engine` alias is what control-plane and Caddy (/ws) resolve.
    restart: unless-stopped
    # Memory cap for the rollout double-up (see web); matches control-plane's Fastify
    # footprint - a ceiling well above real use that only caps a runaway during overlap.
    mem_limit: 300m
    mem_reservation: 128m
    expose:
      - '4001'
    env_file: .env.prod
    environment:
      NODE_ENV: production
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:4001/health -o /dev/null || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - edge
      - db

  postgres:
    image: postgres:16-alpine
    container_name: branchout-postgres
    restart: unless-stopped
    env_file: .env.prod # provides POSTGRES_PASSWORD
    environment:
      POSTGRES_DB: branchout
      POSTGRES_USER: branchout
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U branchout -d branchout']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - db # internal only; no host port

  redis:
    image: redis:7-alpine
    container_name: branchout-redis
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - db # internal only; no host port

volumes:
  postgres_data: # durable; survives redeploys; back up with pg_dump (follow-up)
  redis_data:

networks:
  # Shared with the proxy stack; owned externally.
  # Created by the deploy job: `docker network create edge`.
  edge:
    external: true

  # Internal-only network: app services <-> Postgres/Redis.
  # Not reachable from the host or from Caddy.
  db:
    internal: true
