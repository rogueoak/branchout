# Local dev overlay - auto-merged by `docker compose up` (skip it in prod with
# `-f docker-compose.yml`). It bind-mounts the repo for hot reload and runs each app's `dev`
# script instead of `start`. Anonymous volumes keep the image's installed node_modules from
# being shadowed by the host bind mount (pnpm's store lives in the root node_modules).

services:
  web:
    command: pnpm --filter @branchout/web dev
    # The web image bakes in production NEXT_PUBLIC_* defaults (/api via Caddy, wss://...). Local
    # dev has no proxy, so point the browser straight at the published control-plane / engine
    # ports. Reuse the same ${...PORT} vars that publish those ports (base compose) so a dev who
    # bumps a port in infra/.env stays consistent. `next dev` reads these from the process env,
    # so no rebuild is needed.
    environment:
      NEXT_PUBLIC_CONTROL_PLANE_URL: http://localhost:${CONTROL_PLANE_PORT:-4000}
      NEXT_PUBLIC_ENGINE_WS_URL: ws://localhost:${GAME_ENGINE_PORT:-4001}
    volumes:
      - ..:/repo
      - /repo/node_modules
      - /repo/apps/web/node_modules
      - /repo/apps/web/.next

  control-plane:
    command: pnpm --filter @branchout/control-plane dev
    volumes:
      - ..:/repo
      - /repo/node_modules
      - /repo/apps/control-plane/node_modules

  game-engine:
    command: pnpm --filter @branchout/game-engine dev
    volumes:
      - ..:/repo
      - /repo/node_modules
      - /repo/apps/game-engine/node_modules
      - /repo/packages/protocol/node_modules
