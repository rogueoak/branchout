# Local dev overlay - auto-merged by `docker compose up` (skip it in prod with
# `-f docker-compose.yml`). It bind-mounts the repo for hot reload and runs each app's `dev`
# script instead of `start`. Anonymous volumes keep the image's installed node_modules from
# being shadowed by the host bind mount (pnpm's store lives in the root node_modules).

services:
  web:
    command: pnpm --filter @branchout/web dev
    # The web image bakes in production NEXT_PUBLIC_* defaults (/api via Caddy, wss://...). Local
    # dev has no proxy, so point the browser straight at the published control-plane / engine
    # ports. Reuse the same ${...PORT} vars that publish those ports (base compose) so a dev who
    # bumps a port in infra/.env stays consistent. `next dev` reads these from the process env,
    # so no rebuild is needed.
    #
    # `${LAN_HOST:-localhost}` defaults to localhost; `pnpm dev:lan` sets LAN_HOST to the machine's
    # LAN IP so a phone on the same WiFi reaches the published ports (spec 0024).
    environment:
      NEXT_PUBLIC_CONTROL_PLANE_URL: http://${LAN_HOST:-localhost}:${CONTROL_PLANE_PORT:-4000}
      NEXT_PUBLIC_ENGINE_WS_URL: ws://${LAN_HOST:-localhost}:${GAME_ENGINE_PORT:-4001}
      # Server-side (SSR) calls - getSignedIn (lib/session.ts) and the join-page OG preview
      # (lib/room-preview.ts) - run inside this container, so they reach the control-plane by its
      # compose service name, not the browser's localhost (which would resolve to web itself).
      CONTROL_PLANE_URL: http://control-plane:4000
    volumes:
      - ..:/repo
      - /repo/node_modules
      - /repo/apps/web/node_modules
      - /repo/apps/web/.next

  control-plane:
    command: pnpm --filter @branchout/control-plane dev
    # Allow the browser origin(s) and relax the session cookie for plain-http dev. WEB_ORIGIN is
    # comma-separated: localhost plus, when `pnpm dev:lan` sets LAN_HOST, the LAN URL a phone uses.
    # COOKIE_SECURE=false lets the session cookie set over http (SameSite=lax still flows, since a
    # host and its ports are the same site). Dev-only overlay; production stays secure same-origin.
    environment:
      WEB_ORIGIN: http://localhost:${WEB_PORT:-3000},http://${LAN_HOST:-localhost}:${WEB_PORT:-3000}
      COOKIE_SECURE: 'false'
    volumes:
      - ..:/repo
      - /repo/node_modules
      - /repo/apps/control-plane/node_modules

  game-engine:
    command: pnpm --filter @branchout/game-engine dev
    volumes:
      - ..:/repo
      - /repo/node_modules
      - /repo/apps/game-engine/node_modules
      - /repo/packages/protocol/node_modules
