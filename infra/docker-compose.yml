# Branch out - the whole system in one file. This is the production-shaped compose: it builds
# each app image and runs its `start` command. Local dev layers docker-compose.override.yml on
# top (auto-merged by `docker compose up`) to bind-mount source and run `dev` for hot reload.
#
# Usage:
#   cp .env.example .env
#   docker compose up --build          # dev: base + override (hot reload)
#   docker compose -f docker-compose.yml up --build   # prod-shaped: base only
#
# Build context is the repo root so pnpm can resolve the workspace; Dockerfiles live per app.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      # Loopback only - the datastore serves the app containers, not the public network.
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      # Loopback only - the datastore serves the app containers, not the public network.
      - '127.0.0.1:6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    environment:
      PORT: 3000
    ports:
      - '${WEB_PORT:-3000}:3000'
    depends_on:
      control-plane:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  admin:
    build:
      context: ..
      dockerfile: apps/admin/Dockerfile
    environment:
      PORT: 3002
    ports:
      - '${ADMIN_PORT:-3002}:3002'
    depends_on:
      control-plane:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3002/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  control-plane:
    build:
      context: ..
      dockerfile: apps/control-plane/Dockerfile
    environment:
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      # The engine is a separate container; reach it by service name, not the localhost default.
      ENGINE_URL: http://game-engine:4001
      # Engine-join auth (spec 0064): control-plane mints the join token with this shared secret; the
      # game-engine (below) verifies it with the SAME value. Set in infra/.env so the real auth path
      # runs locally; unset -> the token endpoint returns "not configured" and the engine skips it.
      ENGINE_AUTH_SECRET: ${ENGINE_AUTH_SECRET:-}
      # Host in-game feedback (spec 0048). Unset RESEND_API_KEY -> the endpoint returns a clear
      # "not configured" response instead of sending; the per-IP cap knobs fall back to defaults.
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      FEEDBACK_MAX_PER_IP: ${FEEDBACK_MAX_PER_IP:-5}
      FEEDBACK_WINDOW_SECONDS: ${FEEDBACK_WINDOW_SECONDS:-600}
    ports:
      - '${CONTROL_PLANE_PORT:-4000}:4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  game-engine:
    build:
      context: ..
      dockerfile: apps/game-engine/Dockerfile
    environment:
      PORT: 4001
      REDIS_URL: ${REDIS_URL}
      # Engine-join auth (spec 0064): the SAME shared secret control-plane uses to mint the join
      # token. Set -> the engine REQUIRES a valid token on every WebSocket join. Unset -> skipped.
      ENGINE_AUTH_SECRET: ${ENGINE_AUTH_SECRET:-}
    ports:
      - '${GAME_ENGINE_PORT:-4001}:4001'
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:4001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres-data:
