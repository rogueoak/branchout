# Release pipeline for branchout.games.
# Push to main -> verify (lint/build/test) -> build (three private GHCR images,
# sha-<commit> + latest) -> deploy (SSH to droplet, roll the site forward to the
# exact images built in this run).
#
# Actions are pinned to commit SHAs (mutable tags are a supply-chain risk).
# Dependabot (.github/dependabot.yml) proposes SHA bumps with the tag in a comment.
name: release

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Default to read-only; individual jobs opt into the permissions they need.
permissions:
  contents: read

# Never build+push two sets of images for main at once; let an in-flight run
# finish so sha tags are never clobbered mid-run.
concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  # Gate: same checks the PR runs. A red verify never reaches build or deploy.
  verify:
    uses: ./.github/workflows/ci.yml

  build:
    needs: verify
    runs-on: ubuntu-latest # native amd64; no QEMU emulation needed for the image build
    permissions:
      contents: read
      packages: write # least privilege: only this job pushes images to GHCR
    strategy:
      fail-fast: true
      matrix:
        app: [web, control-plane, game-engine, admin]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.app }}
          tags: |
            type=raw,value=latest
            type=sha,format=long
          # GHCR visibility is set to private in package settings (one-time step
          # documented in deploy/README.md). These labels are used by the image prune.
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.title=${{ matrix.app }}

      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          platforms: linux/amd64
          # Browser-facing URLs baked into the web bundle at build time. The other
          # apps' Dockerfiles do not declare these ARGs, so they ignore them.
          # NEXT_PUBLIC_POSTHOG_KEY is the PostHog PROJECT key (publishable - it ships in the browser
          # bundle anyway), read from a repo variable so it is not hardcoded in source and can differ
          # per fork/env. Set it once: `gh variable set NEXT_PUBLIC_POSTHOG_KEY -b <phc_...>`. If unset,
          # the bundle builds with analytics OFF (safe no-op), matching dev/e2e. The host is the
          # same-origin /ingest proxy (rewritten to PostHog in next.config.mjs), so analytics is
          # first-party behind the Caddy edge.
          build-args: |
            NEXT_PUBLIC_CONTROL_PLANE_URL=/api
            NEXT_PUBLIC_ENGINE_WS_URL=wss://branchout.games/ws
            NEXT_PUBLIC_SITE_URL=https://branchout.games
            NEXT_PUBLIC_POSTHOG_KEY=${{ vars.NEXT_PUBLIC_POSTHOG_KEY }}
            NEXT_PUBLIC_POSTHOG_HOST=/ingest
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # No cross-run build cache: a stale COPY . . layer can silently ship old
          # source. A clean build per run is the reliable default.
          no-cache: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # deploy only reads the repo and calls out over SSH; no extra permissions needed. The private
    # game-data repo is pulled ON THE BOX via a read-only deploy key (see the remote script below),
    # so the runner needs no checkout and no cross-repo token.
    steps:
      - name: Deploy over SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
          # Pin the exact images built in this run. Full SHA is auditable; rollback
          # is a re-run of release for an earlier commit, or IMAGE_TAG override.
          IMAGE_TAG: sha-${{ github.sha }}
          # Passed to the droplet so it can log in to GHCR to pull private images.
          # The token has packages:read (the deploy job has no extra permissions),
          # is scoped to this run, and expires when the run ends.
          RUN_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR_NAME: ${{ github.actor }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          # Host in-game feedback email via Resend (spec 0048). Optional: unset -> the endpoint returns
          # a clear "not configured" response and never crashes, so a box with no key still boots. Set
          # it AND verify rogueoak.com as a Resend sending domain to actually deliver.
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          # Newsletter subscribe / Constant Contact (specs 0047 + 0049). Optional secrets: while unset the
          # POST /v1/subscribe endpoint ships INERT (a clear "not configured" response, never a crash),
          # so the pipeline works before an operator provisions them. When set, they are written to
          # .env.prod below. Mint CTCT_REFRESH_TOKEN via `ctct login`; find CTCT_LIST_ID via
          # `ctct list list --name "Branch Out"`. NOTE: CTCT_REFRESH_TOKEN is only the INITIAL SEED - the
          # daily keepalive cron (spec 0049) can rotate it on the box, and the deploy PRESERVES the box's
          # value rather than clobbering it (see below). CTCT_CLIENT_ID / CTCT_LIST_ID are stable.
          CTCT_CLIENT_ID: ${{ secrets.CTCT_CLIENT_ID }}
          CTCT_REFRESH_TOKEN: ${{ secrets.CTCT_REFRESH_TOKEN }}
          CTCT_LIST_ID: ${{ secrets.CTCT_LIST_ID }}
          # Optional per-IP rate-limit tunables (default 5 / 600s when unset).
          SUBSCRIBE_MAX_PER_IP: ${{ vars.SUBSCRIBE_MAX_PER_IP }}
          SUBSCRIBE_WINDOW_SECONDS: ${{ vars.SUBSCRIBE_WINDOW_SECONDS }}
          # Root admin creds (spec 0037) are managed ON THE BOX only - never in GitHub. They live in the
          # host .env.prod and are PRESERVED across the rewrite below (not sourced from a secret). To
          # seed/rotate the break-glass root admin, edit ADMIN_ROOT_EMAIL/ADMIN_ROOT_PASSWORD in
          # /home/deploy/branchout/deploy/docker/.env.prod on the droplet.
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Pinned host key prevents MITM on deploy. No trust-on-first-use.
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

          # Pass every value to the remote shell over the encrypted stdin channel,
          # not on the SSH command line: printf %q emits a shell-safe assignment for
          # any value (a single quote or special char can't break the script), and
          # keeping them off argv means they never reach the remote command that
          # sshd may log at VERBOSE/DEBUG. The heredoc delimiter is quoted so the
          # runner shell does no expansion of the script body itself.
          {
            printf 'export IMAGE_TAG=%q\n' "$IMAGE_TAG"
            printf 'export GHCR_TOKEN=%q\n' "$RUN_TOKEN"
            printf 'export GHCR_ACTOR=%q\n' "$GITHUB_ACTOR_NAME"
            printf 'export POSTGRES_PASSWORD=%q\n' "$POSTGRES_PASSWORD"
            printf 'export SESSION_SECRET=%q\n' "$SESSION_SECRET"
            printf 'export RESEND_API_KEY=%q\n' "$RESEND_API_KEY"
            # Subscribe / Constant Contact (spec 0047). Optional: empty when the secret/var is unset,
            # which the remote script treats as "leave the endpoint inert" (writes no .env.prod line).
            printf 'export CTCT_CLIENT_ID=%q\n' "$CTCT_CLIENT_ID"
            printf 'export CTCT_REFRESH_TOKEN=%q\n' "$CTCT_REFRESH_TOKEN"
            printf 'export CTCT_LIST_ID=%q\n' "$CTCT_LIST_ID"
            printf 'export SUBSCRIBE_MAX_PER_IP=%q\n' "$SUBSCRIBE_MAX_PER_IP"
            printf 'export SUBSCRIBE_WINDOW_SECONDS=%q\n' "$SUBSCRIBE_WINDOW_SECONDS"
            cat <<'REMOTE'
          set -euo pipefail
          REPO="$HOME/branchout"

          # Self-bootstrap: clone on first deploy; force-sync on subsequent runs
          # so a stray local edit on the server never wedges a future deploy.
          if [ ! -d "$REPO/.git" ]; then
            git clone https://github.com/rogueoak/branchout.git "$REPO"
          fi
          cd "$REPO"
          git fetch --prune origin
          git reset --hard origin/main

          # Private game-data (spec 0041): sync $HOME/branchout-data to the tag pinned in
          # deploy/data.version. The box authenticates to the private repo with a READ-ONLY deploy
          # key via the `github-data` SSH alias (~/.ssh/config -> IdentityFile branchout_data_deploy;
          # one-time host setup, see deploy/README.md). The compose mount reads $DATA_REPO/data.
          # The checkout is FORCED and the tree is cleaned first: like the branchout self-sync above,
          # a stray untracked or locally-modified file on the box must never wedge a future sync (a
          # plain `checkout` aborts when an untracked file collides with the target tree).
          # Best-effort: if GitHub is unreachable or the tag is missing, keep the currently
          # checked-out data and continue - an app deploy is never blocked on the data pipeline, and
          # the read-only mount always has the last-good content.
          DATA_REPO="$HOME/branchout-data"
          DATA_VERSION="$(head -1 "$REPO/deploy/data.version" | tr -d '[:space:]')"
          if [ ! -d "$DATA_REPO/.git" ]; then
            git clone git@github-data:rogueoak/branchout-data.git "$DATA_REPO" || \
              echo "WARNING: could not clone game-data repo (is the deploy key set up?); continuing"
          fi
          if [ -d "$DATA_REPO/.git" ]; then
            if git -C "$DATA_REPO" fetch --tags --prune origin >/dev/null 2>&1 &&
               git -C "$DATA_REPO" clean -fd >/dev/null 2>&1 &&
               git -C "$DATA_REPO" checkout -f --detach "tags/$DATA_VERSION" >/dev/null 2>&1; then
              echo "game-data synced to $DATA_VERSION"
            else
              echo "WARNING: game-data sync to '$DATA_VERSION' failed; keeping existing $(git -C "$DATA_REPO" describe --tags 2>/dev/null || echo unknown)"
            fi
          fi

          # Ensure the shared edge network exists (idempotent).
          docker network inspect edge >/dev/null 2>&1 || docker network create edge

          # Validate the Caddyfile before touching the live proxy. A bad config
          # fails the deploy here, not after taking the edge down.
          docker run --rm \
            -v "$PWD/deploy/docker/Caddyfile:/etc/caddy/Caddyfile:ro" \
            caddy:2-alpine caddy validate --config /etc/caddy/Caddyfile

          # Bring up (or update) the proxy stack. --force-recreate is required: the
          # Caddyfile is a bind-mounted file, and `git reset --hard` above replaces it
          # with a new inode, so a plain `up -d` (which does not recreate an unchanged
          # service) keeps the container bound to the STALE inode - a Caddyfile change
          # would silently not take effect. Recreating re-binds the current file.
          docker compose -f deploy/docker/compose.proxy.yml up -d --wait --force-recreate

          # Install the docker-rollout plugin (spec 0034), SHA-pinned + checksum-verified.
          # It is a shell script run on the host during a privileged deploy, so it is treated
          # as supply chain: verify-then-exec, never runnable before the checksum passes. Done
          # BEFORE the GHCR login below so its temp-cleanup EXIT trap does not clobber the
          # later `docker logout` EXIT trap.
          # docker-rollout v0.13: github.com/Wowu/docker-rollout/releases/tag/v0.13
          ROLLOUT_SHA=39b8066d56cc1edc76d1ae898db46623cc93bc24
          ROLLOUT_SHA256=fa0df004de84747142cb627c55210aaa914bbae76666e7b95a2ac46805d81a84
          plugin="$HOME/.docker/cli-plugins/docker-rollout"
          if ! printf '%s  %s\n' "$ROLLOUT_SHA256" "$plugin" | sha256sum -c - >/dev/null 2>&1; then
            mkdir -p "$HOME/.docker/cli-plugins"
            tmp=$(mktemp)
            trap 'rm -f "$tmp"' EXIT
            curl -fsSL --proto '=https' --tlsv1.2 --max-time 30 \
              "https://raw.githubusercontent.com/Wowu/docker-rollout/$ROLLOUT_SHA/docker-rollout" -o "$tmp"
            printf '%s  %s\n' "$ROLLOUT_SHA256" "$tmp" | sha256sum -c -
            chmod +x "$tmp"
            mv "$tmp" "$plugin"
            trap - EXIT
          fi

          # Log in to GHCR with the run-scoped token (packages:read, ephemeral).
          # Pipe via stdin so the token never appears in process arguments or logs.
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin
          # Guarantee logout even if a later step fails - no GHCR credentials linger.
          trap 'docker logout ghcr.io >/dev/null 2>&1 || true' EXIT

          # Write the host env file NEXT TO the compose file, so `env_file: .env.prod`
          # (resolved relative to the compose file's directory) finds it. mode 0600:
          # only the deploy user can read it. This file is the only place secrets live
          # on the host; it is gitignored and never committed.
          ENV_FILE="deploy/docker/.env.prod"
          # Root admin creds (spec 0037) live ONLY on the box - read them from the current env file
          # before it is truncated, so the rewrite preserves them instead of clobbering them with a
          # value from GitHub (which we deliberately do not store there).
          # `|| true` on every preserve-read: under `set -o pipefail` a no-match grep exits non-zero,
          # and `set -e` would then abort the whole deploy on a box that simply does not have the key
          # yet (a first deploy, or a key added later like CTCT_REFRESH_TOKEN in spec 0049). Empty on
          # no-match is the intended "box never set this" behaviour, not a fatal error.
          PREV_ADMIN_ROOT_EMAIL=$(grep -E '^ADMIN_ROOT_EMAIL=' "$ENV_FILE" 2>/dev/null | head -1 | cut -d= -f2- || true)
          PREV_ADMIN_ROOT_PASSWORD=$(grep -E '^ADMIN_ROOT_PASSWORD=' "$ENV_FILE" 2>/dev/null | head -1 | cut -d= -f2- || true)
          # CTCT refresh token (specs 0047 + 0049): the daily keepalive cron on the box can ROTATE this
          # token in .env.prod. Read the box's current value before truncating so the rewrite preserves
          # it - the secrets.CTCT_REFRESH_TOKEN below is only the INITIAL SEED; once the box holds a
          # (possibly rotated) token, a deploy must NOT clobber it with the stale secret.
          PREV_CTCT_REFRESH_TOKEN=$(grep -E '^CTCT_REFRESH_TOKEN=' "$ENV_FILE" 2>/dev/null | head -1 | cut -d= -f2- || true)
          # Prefer the box's preserved token; fall back to the seed secret only on a box that never had one.
          CTCT_REFRESH_TOKEN="${PREV_CTCT_REFRESH_TOKEN:-$CTCT_REFRESH_TOKEN}"
          install -m 0600 /dev/null "$ENV_FILE"
          # Full runtime env for the app services. DATABASE_URL/REDIS_URL are required
          # by control-plane and game-engine; the rest wire the services to each other
          # over the container network and set the browser origin for CORS.
          {
            printf 'POSTGRES_PASSWORD=%s\n' "$POSTGRES_PASSWORD"
            printf 'SESSION_SECRET=%s\n' "$SESSION_SECRET"
            # Host feedback email key (spec 0048). Empty when the secret is unset -> control-plane
            # config leaves it unset and the endpoint stays inert (a clear "not configured" reply).
            printf 'RESEND_API_KEY=%s\n' "$RESEND_API_KEY"
            printf 'DATABASE_URL=postgres://branchout:%s@postgres:5432/branchout\n' "$POSTGRES_PASSWORD"
            printf 'REDIS_URL=redis://redis:6379\n'
            printf 'ENGINE_URL=http://game-engine:4001\n'
            printf 'CONTROL_PLANE_URL=http://control-plane:4000\n'
            printf 'WEB_ORIGIN=https://branchout.games\n'
            # Scope the player session cookie to the parent domain so one login spans the apex and the
            # insider subdomain (spec 0035). Written here (not a manual .env.prod key) because this file
            # is rewritten fresh every deploy. The admin cookie is separate + always host-only.
            printf 'COOKIE_DOMAIN=.branchout.games\n'
            # Root admin creds (spec 0037): preserved from the box's own env file (host-managed, never in
            # GitHub). Blank on a box that never set them -> the boot reconcile is a no-op.
            printf 'ADMIN_ROOT_EMAIL=%s\n' "$PREV_ADMIN_ROOT_EMAIL"
            printf 'ADMIN_ROOT_PASSWORD=%s\n' "$PREV_ADMIN_ROOT_PASSWORD"
            # Newsletter subscribe / Constant Contact (specs 0047 + 0049). Written ONLY when a value is
            # set: an empty value would make control-plane read '' (still inert) but writing nothing
            # keeps the endpoint cleanly "not configured" and the file free of blank keys. The optional
            # per-IP knobs fall back to their code defaults (5 / 600s) when unset.
            # CTCT_CLIENT_ID and CTCT_LIST_ID are STABLE - always sourced from the secrets each deploy.
            # CTCT_REFRESH_TOKEN was resolved above to the box's PRESERVED (possibly rotated) value,
            # falling back to the seed secret only on a first-time box: the keepalive cron rotates it on
            # the box, so a deploy must preserve it rather than overwrite it with the stale secret.
            [ -n "$CTCT_CLIENT_ID" ] && printf 'CTCT_CLIENT_ID=%s\n' "$CTCT_CLIENT_ID"
            [ -n "$CTCT_REFRESH_TOKEN" ] && printf 'CTCT_REFRESH_TOKEN=%s\n' "$CTCT_REFRESH_TOKEN"
            [ -n "$CTCT_LIST_ID" ] && printf 'CTCT_LIST_ID=%s\n' "$CTCT_LIST_ID"
            [ -n "$SUBSCRIBE_MAX_PER_IP" ] && printf 'SUBSCRIBE_MAX_PER_IP=%s\n' "$SUBSCRIBE_MAX_PER_IP"
            [ -n "$SUBSCRIBE_WINDOW_SECONDS" ] && printf 'SUBSCRIBE_WINDOW_SECONDS=%s\n' "$SUBSCRIBE_WINDOW_SECONDS"
            # The engine reaches the report intake over the container network and does
            # not present a token yet (follow-up). Caddy blocks /api/engine/* from the
            # internet, so the intake is only reachable internally - open here is safe.
            printf 'ALLOW_UNAUTHENTICATED_ENGINE=1\n'
            # Host path of the private game-data repo (cloned + tag-pinned above). Compose
            # bind-mounts $GAME_DATA_HOST/data read-only into game-engine/admin and sets
            # GAME_DATA_DIR so the asset loader reads the mount (see deploy/README.md).
            printf 'GAME_DATA_HOST=%s\n' "$DATA_REPO"
          } > "$ENV_FILE"

          # Pre-pull every image so a rollout's new container starts instantly (no pull
          # mid-swap) and a non-pullable tag fails HERE, before anything swaps.
          docker compose -f deploy/docker/compose.site.yml pull

          # Stateful data tier: bring it up WITHOUT ever doubling it. --no-recreate leaves a
          # running, unchanged Postgres/Redis untouched (never rolled - single volume), and
          # --wait gates on their health so the app rollouts below have a healthy DB/cache.
          docker compose -f deploy/docker/compose.site.yml up -d --no-recreate --wait postgres redis

          # Zero-downtime rollout (spec 0034), ONE app service at a time so the small droplet
          # never runs the whole stack twice. docker-rollout scales the service to a second
          # Compose-indexed instance, waits up to 90s for its HEALTHCHECK (image start-period
          # 30s), holds a short grace so Caddy's 1s DNS refresh sees the new instance, then
          # removes the old. Order is backend first (control-plane, then game-engine), web last,
          # so the frontend rolls against an already-updated backend. Fail-safe: an image that
          # pulls but never goes healthy makes rollout remove the NEW instance and leave the old
          # serving, exiting non-zero - a bad build cannot black out the site.
          for svc in control-plane game-engine web admin; do
            docker rollout -t 90 --wait-after-healthy 5 -f deploy/docker/compose.site.yml "$svc"
          done

          # Gate on the FULL public path, not just the container HEALTHCHECK: a Caddy
          # dynamic-upstream misconfig can leave every container healthy while visitors get
          # 502s, and nothing else re-verifies the routing on each deploy. Probe BOTH the page
          # (web upstream) AND the REST API (/api -> control-plane upstream) so a broken block on
          # either dynamic upstream fails the deploy - hitting only `/` would pass a broken /api.
          # Through Caddy over loopback (--resolve, so it does not depend on DNS/hairpin).
          # (The /ws upstream is not probed here: a WebSocket handshake is not a plain GET, and
          # in-flight WS sessions self-heal via client reconnect over Redis - see deploy/README.md.)
          ok=""
          for _ in $(seq 1 10); do
            if curl -fsS --max-time 10 --resolve branchout.games:443:127.0.0.1 \
                 -o /dev/null https://branchout.games &&
               curl -fsS --max-time 10 --resolve branchout.games:443:127.0.0.1 \
                 -o /dev/null https://branchout.games/api/v1/auth/me; then ok=1; break; fi
            sleep 2
          done
          [ -n "$ok" ] || { echo "post-rollout health check failed: branchout.games is not reachable end-to-end (page + /api)"; exit 1; }

          # Prune old branchout images (label-scoped; running images are in-use
          # and kept; a cohosted stack's images are untouched).
          docker image prune -af \
            --filter "label=org.opencontainers.image.source=https://github.com/rogueoak/branchout"
          REMOTE
          } | ssh -i ~/.ssh/deploy_key \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            -o StrictHostKeyChecking=yes \
            "$USER@$HOST" bash -s
