# Release pipeline for branchout.games.
# Push to main -> verify (lint/build/test) -> build (three private GHCR images,
# sha-<commit> + latest) -> deploy (SSH to droplet, roll the site forward to the
# exact images built in this run).
#
# Actions are pinned to commit SHAs (mutable tags are a supply-chain risk).
# Dependabot (.github/dependabot.yml) proposes SHA bumps with the tag in a comment.
name: release

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Default to read-only; individual jobs opt into the permissions they need.
permissions:
  contents: read

# Never build+push two sets of images for main at once; let an in-flight run
# finish so sha tags are never clobbered mid-run.
concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  # Gate: same checks the PR runs. A red verify never reaches build or deploy.
  verify:
    uses: ./.github/workflows/ci.yml

  build:
    needs: verify
    runs-on: ubuntu-latest # native amd64; no QEMU emulation needed for the image build
    permissions:
      contents: read
      packages: write # least privilege: only this job pushes images to GHCR
    strategy:
      fail-fast: true
      matrix:
        app: [web, control-plane, game-engine]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.app }}
          tags: |
            type=raw,value=latest
            type=sha,format=long
          # GHCR visibility is set to private in package settings (one-time step
          # documented in deploy/README.md). These labels are used by the image prune.
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.title=${{ matrix.app }}

      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          platforms: linux/amd64
          # Browser-facing URLs baked into the web bundle at build time. The other
          # apps' Dockerfiles do not declare these ARGs, so they ignore them.
          build-args: |
            NEXT_PUBLIC_CONTROL_PLANE_URL=/api
            NEXT_PUBLIC_ENGINE_WS_URL=wss://branchout.games/ws
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # No cross-run build cache: a stale COPY . . layer can silently ship old
          # source. A clean build per run is the reliable default.
          no-cache: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # deploy only reads the repo and calls out over SSH; no extra permissions needed.
    steps:
      - name: Deploy over SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
          # Pin the exact images built in this run. Full SHA is auditable; rollback
          # is a re-run of release for an earlier commit, or IMAGE_TAG override.
          IMAGE_TAG: sha-${{ github.sha }}
          # Passed to the droplet so it can log in to GHCR to pull private images.
          # The token has packages:read (the deploy job has no extra permissions),
          # is scoped to this run, and expires when the run ends.
          RUN_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR_NAME: ${{ github.actor }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Pinned host key prevents MITM on deploy. No trust-on-first-use.
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

          # Pass every value to the remote shell over the encrypted stdin channel,
          # not on the SSH command line: printf %q emits a shell-safe assignment for
          # any value (a single quote or special char can't break the script), and
          # keeping them off argv means they never reach the remote command that
          # sshd may log at VERBOSE/DEBUG. The heredoc delimiter is quoted so the
          # runner shell does no expansion of the script body itself.
          {
            printf 'export IMAGE_TAG=%q\n' "$IMAGE_TAG"
            printf 'export GHCR_TOKEN=%q\n' "$RUN_TOKEN"
            printf 'export GHCR_ACTOR=%q\n' "$GITHUB_ACTOR_NAME"
            printf 'export POSTGRES_PASSWORD=%q\n' "$POSTGRES_PASSWORD"
            printf 'export SESSION_SECRET=%q\n' "$SESSION_SECRET"
            cat <<'REMOTE'
          set -euo pipefail
          REPO="$HOME/branchout"

          # Self-bootstrap: clone on first deploy; force-sync on subsequent runs
          # so a stray local edit on the server never wedges a future deploy.
          if [ ! -d "$REPO/.git" ]; then
            git clone https://github.com/rogueoak/branchout.git "$REPO"
          fi
          cd "$REPO"
          git fetch --prune origin
          git reset --hard origin/main

          # Ensure the shared edge network exists (idempotent).
          docker network inspect edge >/dev/null 2>&1 || docker network create edge

          # Validate the Caddyfile before touching the live proxy. A bad config
          # fails the deploy here, not after taking the edge down.
          docker run --rm \
            -v "$PWD/deploy/docker/Caddyfile:/etc/caddy/Caddyfile:ro" \
            caddy:2-alpine caddy validate --config /etc/caddy/Caddyfile

          # Bring up (or update) the proxy stack.
          docker compose -f deploy/docker/compose.proxy.yml up -d --wait

          # Log in to GHCR with the run-scoped token (packages:read, ephemeral).
          # Pipe via stdin so the token never appears in process arguments or logs.
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin
          # Guarantee logout even if a later step fails - no GHCR credentials linger.
          trap 'docker logout ghcr.io >/dev/null 2>&1 || true' EXIT

          # Write the host env file NEXT TO the compose file, so `env_file: .env.prod`
          # (resolved relative to the compose file's directory) finds it. mode 0600:
          # only the deploy user can read it. This file is the only place secrets live
          # on the host; it is gitignored and never committed.
          ENV_FILE="deploy/docker/.env.prod"
          install -m 0600 /dev/null "$ENV_FILE"
          # Full runtime env for the app services. DATABASE_URL/REDIS_URL are required
          # by control-plane and game-engine; the rest wire the services to each other
          # over the container network and set the browser origin for CORS.
          {
            printf 'POSTGRES_PASSWORD=%s\n' "$POSTGRES_PASSWORD"
            printf 'SESSION_SECRET=%s\n' "$SESSION_SECRET"
            printf 'DATABASE_URL=postgres://branchout:%s@postgres:5432/branchout\n' "$POSTGRES_PASSWORD"
            printf 'REDIS_URL=redis://redis:6379\n'
            printf 'ENGINE_URL=http://game-engine:4001\n'
            printf 'CONTROL_PLANE_URL=http://control-plane:4000\n'
            printf 'WEB_ORIGIN=https://branchout.games\n'
            # The engine reaches the report intake over the container network and does
            # not present a token yet (follow-up). Caddy blocks /api/engine/* from the
            # internet, so the intake is only reachable internally - open here is safe.
            printf 'ALLOW_UNAUTHENTICATED_ENGINE=1\n'
          } > "$ENV_FILE"

          # Pull new images, then roll forward. --wait blocks until every service
          # passes its HEALTHCHECK; a broken image returns non-zero here and aborts
          # the deploy before any traffic is affected.
          docker compose -f deploy/docker/compose.site.yml pull
          docker compose -f deploy/docker/compose.site.yml up -d --wait

          # Prune old branchout images (label-scoped; running images are in-use
          # and kept; a cohosted stack's images are untouched).
          docker image prune -af \
            --filter "label=org.opencontainers.image.source=https://github.com/rogueoak/branchout"
          REMOTE
          } | ssh -i ~/.ssh/deploy_key \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            -o StrictHostKeyChecking=yes \
            "$USER@$HOST" bash -s
