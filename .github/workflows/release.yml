# Release pipeline for branchout.games.
# Push to main -> verify (lint/build/test) -> build (three private GHCR images,
# sha-<commit> + latest) -> deploy (SSH to droplet, roll the site forward to the
# exact images built in this run).
#
# Actions are pinned to commit SHAs (mutable tags are a supply-chain risk).
# Dependabot (.github/dependabot.yml) proposes SHA bumps with the tag in a comment.
name: release

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Default to read-only; individual jobs opt into the permissions they need.
permissions:
  contents: read

# Never build+push two sets of images for main at once; let an in-flight run
# finish so sha tags are never clobbered mid-run.
concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  # Gate: same checks the PR runs. A red verify never reaches build or deploy.
  verify:
    uses: ./.github/workflows/ci.yml

  build:
    needs: verify
    runs-on: ubuntu-latest # native amd64; no QEMU emulation needed for the image build
    permissions:
      contents: read
      packages: write # least privilege: only this job pushes images to GHCR
    strategy:
      fail-fast: true
      matrix:
        app: [web, control-plane, game-engine]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@902fa8ec7d6ecbea8a9d04f42f77c272bd0b0f89 # v5.7.0
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.app }}
          tags: |
            type=raw,value=latest
            type=sha,format=long
          # GHCR visibility is set to private in package settings (one-time step
          # documented in deploy/README.md). These labels are used by the image prune.
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.title=${{ matrix.app }}

      - uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # No cross-run build cache: a stale COPY . . layer can silently ship old
          # source. A clean build per run is the reliable default.
          no-cache: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # deploy only reads the repo and calls out over SSH; no extra permissions needed.
    steps:
      - name: Deploy over SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
          # Pin the exact images built in this run. Full SHA is auditable; rollback
          # is a re-run of release for an earlier commit, or IMAGE_TAG override.
          IMAGE_TAG: sha-${{ github.sha }}
          # Passed to the droplet so it can log in to GHCR to pull private images.
          # The token has packages:read (the deploy job has no extra permissions),
          # is scoped to this run, and expires when the run ends.
          RUN_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR_NAME: ${{ github.actor }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Pinned host key prevents MITM on deploy. No trust-on-first-use.
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

          ssh -i ~/.ssh/deploy_key \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            -o StrictHostKeyChecking=yes \
            "$USER@$HOST" \
            "IMAGE_TAG='$IMAGE_TAG' \
             GHCR_TOKEN='$RUN_TOKEN' \
             GHCR_ACTOR='$GITHUB_ACTOR_NAME' \
             POSTGRES_PASSWORD='$POSTGRES_PASSWORD' \
             SESSION_SECRET='$SESSION_SECRET' \
             bash -se" <<'REMOTE'
          set -euo pipefail
          REPO="$HOME/branchout"

          # Self-bootstrap: clone on first deploy; force-sync on subsequent runs
          # so a stray local edit on the server never wedges a future deploy.
          if [ ! -d "$REPO/.git" ]; then
            git clone https://github.com/rogueoak/branchout.git "$REPO"
          fi
          cd "$REPO"
          git fetch --prune origin
          git reset --hard origin/main

          # Ensure the shared edge network exists (idempotent).
          docker network inspect edge >/dev/null 2>&1 || docker network create edge

          # Validate the Caddyfile before touching the live proxy. A bad config
          # fails the deploy here, not after taking the edge down.
          docker run --rm \
            -v "$PWD/deploy/docker/Caddyfile:/etc/caddy/Caddyfile:ro" \
            caddy:2-alpine caddy validate --config /etc/caddy/Caddyfile

          # Bring up (or update) the proxy stack.
          docker compose -f deploy/docker/compose.proxy.yml up -d --wait

          # Log in to GHCR with the run-scoped token (packages:read, ephemeral).
          # Pipe via stdin so the token never appears in process arguments or logs.
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin

          # Write the host env file from GitHub secrets. mode 0600: only the
          # deploy user can read it. This file is the only place secrets live on
          # the host; it is not committed to git.
          install -m 0600 /dev/null .env.prod
          printf 'POSTGRES_PASSWORD=%s\nSESSION_SECRET=%s\n' \
            "$POSTGRES_PASSWORD" "$SESSION_SECRET" > .env.prod

          # Pull new images, then roll forward. --wait blocks until every service
          # passes its HEALTHCHECK; a broken image returns non-zero here and aborts
          # the deploy before any traffic is affected.
          docker compose -f deploy/docker/compose.site.yml pull
          docker compose -f deploy/docker/compose.site.yml up -d --wait

          # Log out so no GHCR credentials linger on the host.
          docker logout ghcr.io

          # Prune old branchout images (label-scoped; running images are in-use
          # and kept; a cohosted stack's images are untouched).
          docker image prune -af \
            --filter "label=org.opencontainers.image.source=https://github.com/rogueoak/branchout"
          REMOTE
