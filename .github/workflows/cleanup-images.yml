# Prune old GHCR container image versions for each of the three branchout
# app packages. Keeps the 30 most recent tagged images (plus the manifests
# they reference) and removes older tagged images and orphaned untagged
# manifests. 30 gives ~30 commits of headroom for a rollback; if you need
# more, raise keep-n-tagged.

name: Cleanup images

on:
  schedule:
    # Daily at 04:17 UTC (off-peak). The scheduled run is live (it deletes).
    - cron: "17 4 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview deletions without actually deleting"
        type: boolean
        default: true

# Least privilege: deleting package versions requires packages:write.
permissions:
  contents: read
  packages: write

# Never let two cleanup runs race on the same packages.
concurrency:
  group: cleanup-images
  cancel-in-progress: false

jobs:
  cleanup:
    name: Prune old GHCR images (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # clean up as many packages as possible even if one fails
      matrix:
        app: [web, control-plane, game-engine]
    steps:
      - name: Delete old image versions (${{ matrix.app }})
        # dataaxiom/ghcr-cleanup-action is referrer-aware: it retains manifests
        # referenced by kept tags so a live image is never corrupted, unlike a
        # raw version-count prune. Pinned to a commit SHA per supply-chain rules.
        uses: dataaxiom/ghcr-cleanup-action@d52806a0dc70b430571a37da1fde39733ffd640f # v1.2.2
        with:
          package: branchout/${{ matrix.app }}
          keep-n-tagged: 30
          delete-untagged: true
          delete-partial-images: true
          # Live on the daily schedule; manual runs default to safe preview.
          dry-run: ${{ inputs.dry_run || false }}
          token: ${{ secrets.GITHUB_TOKEN }}
