<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="Branch out Odd Bird">
  <defs>
    <radialGradient id="hob-bg" cx="0.55" cy="0.4" r="0.85">
      <stop offset="0" stop-color="#221836"/>
      <stop offset="1" stop-color="#0d0a15"/>
    </radialGradient>
    <radialGradient id="hob-glow" cx="0.62" cy="0.42" r="0.5">
      <stop offset="0" stop-color="#F59E0B" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hob-branch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6b4a2a"/>
      <stop offset="1" stop-color="#3a2717"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#hob-bg)"/>
  <circle cx="530" cy="215" r="280" fill="url(#hob-glow)"/>

  <!-- The oak branch the flock perches on: a stem from the gold root, curving across the frame. -->
  <g fill="none" stroke="url(#hob-branch)" stroke-linecap="round">
    <path d="M400 424 L400 312 C400 276 476 268 726 244" stroke-width="16"/>
    <path d="M400 312 C400 284 356 278 300 268" stroke-width="14"/>
  </g>
  <!-- a couple of oak leaves on the branch -->
  <g fill="#4c7a3a" opacity="0.9">
    <path d="M300 268 q-24 -12 -34 -34 q22 -4 40 10 q6 14 -6 24 Z"/>
    <path d="M726 244 q24 -12 34 -34 q-22 -4 -40 10 q-6 14 6 24 Z"/>
  </g>

  <!-- The flock: three matching amber birds perched together, all facing the same way. -->
  <g>
    <g transform="translate(420 250)">
      <ellipse cx="0" cy="0" rx="24" ry="18" fill="#F6B84B"/>
      <circle cx="16" cy="-13" r="12" fill="#F6B84B"/>
      <path d="M26 -15 l15 4 l-15 8 Z" fill="#d2820f"/>
      <circle cx="18" cy="-15" r="3.2" fill="#1a1a1a"/>
      <path d="M-20 4 q-20 6 -28 18 q20 0 32 -8 Z" fill="#e09a24"/>
    </g>
    <g transform="translate(500 246)">
      <ellipse cx="0" cy="0" rx="24" ry="18" fill="#F6B84B"/>
      <circle cx="16" cy="-13" r="12" fill="#F6B84B"/>
      <path d="M26 -15 l15 4 l-15 8 Z" fill="#d2820f"/>
      <circle cx="18" cy="-15" r="3.2" fill="#1a1a1a"/>
      <path d="M-20 4 q-20 6 -28 18 q20 0 32 -8 Z" fill="#e09a24"/>
    </g>
    <g transform="translate(580 240)">
      <ellipse cx="0" cy="0" rx="24" ry="18" fill="#F6B84B"/>
      <circle cx="16" cy="-13" r="12" fill="#F6B84B"/>
      <path d="M26 -15 l15 4 l-15 8 Z" fill="#d2820f"/>
      <circle cx="18" cy="-15" r="3.2" fill="#1a1a1a"/>
      <path d="M-20 4 q-20 6 -28 18 q20 0 32 -8 Z" fill="#e09a24"/>
    </g>
  </g>

  <!-- The odd bird: a violet bird apart at the branch tip, facing the other way. -->
  <g transform="translate(694 234) scale(-1 1)">
    <ellipse cx="0" cy="0" rx="25" ry="19" fill="#8B5CF6"/>
    <circle cx="16" cy="-14" r="13" fill="#8B5CF6"/>
    <path d="M27 -16 l16 4 l-16 9 Z" fill="#6d28d9"/>
    <circle cx="18" cy="-16" r="3.6" fill="#f5f0ff"/>
    <circle cx="19" cy="-16" r="1.8" fill="#1a1a1a"/>
    <path d="M-21 5 q-22 7 -30 20 q22 0 33 -8 Z" fill="#7c3aed"/>
    <path d="M-5 -20 q9 -13 20 -5" fill="none" stroke="#C4B5FD" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- gold root node: the base of the branch -->
  <circle cx="400" cy="424" r="12" fill="#d2a463"/>

  <!-- Wordmark, in the system-font stack (the raster pipeline embeds no fonts). -->
  <text x="60" y="225" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="70" font-weight="700" fill="#f4f1fb">Odd</text>
  <text x="60" y="292" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="70" font-weight="700" fill="#f4f1fb">Bird</text>
  <text x="62" y="336" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="24" font-weight="500" fill="#b9b2cf">Spot the bird that stands out.</text>
</svg>
