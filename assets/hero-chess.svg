<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="Branch out Chess">
  <defs>
    <radialGradient id="hch-bg" cx="0.55" cy="0.4" r="0.85">
      <stop offset="0" stop-color="#221836"/>
      <stop offset="1" stop-color="#0d0a15"/>
    </radialGradient>
    <linearGradient id="hch-wood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4a3524"/>
      <stop offset="1" stop-color="#2e2016"/>
    </linearGradient>
    <linearGradient id="hch-violet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C4B5FD"/>
      <stop offset="1" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="hch-amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FDE047"/>
      <stop offset="1" stop-color="#CA8A04"/>
    </linearGradient>
    <radialGradient id="hch-glow" cx="0.66" cy="0.42" r="0.5">
      <stop offset="0" stop-color="#7C3AED" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#hch-bg)"/>
  <circle cx="580" cy="220" r="290" fill="url(#hch-glow)"/>

  <!-- the wood-grain board, tilted for depth: a hint of the checkerboard -->
  <g transform="rotate(-6 580 350)">
    <rect x="460" y="330" width="240" height="110" rx="18" fill="url(#hch-wood)" stroke="#1c130c" stroke-width="5"/>
    <g fill="#1c130c" opacity="0.5">
      <rect x="460" y="330" width="60" height="55"/>
      <rect x="580" y="330" width="60" height="55"/>
      <rect x="520" y="385" width="60" height="55"/>
      <rect x="640" y="385" width="60" height="55"/>
    </g>
  </g>

  <!-- the oak king: a two-tone canopy of leaf points (violet vs amber sides) -->
  <g stroke="#1c130c" stroke-width="4" stroke-linejoin="round">
    <path d="M 528 152 L 546 100 L 564 152 Z" fill="url(#hch-violet)"/>
    <path d="M 564 152 L 582 88 L 600 152 Z" fill="url(#hch-violet)"/>
    <path d="M 600 152 L 618 100 L 636 152 Z" fill="url(#hch-amber)"/>
    <!-- the cross atop the king, formed of two small branches -->
    <rect x="574" y="56" width="16" height="44" rx="4" fill="#d2a463"/>
    <rect x="560" y="68" width="44" height="16" rx="4" fill="#d2a463"/>
  </g>

  <!-- the trunk / king body -->
  <path d="M 540 152 L 626 152 L 612 248 L 554 248 Z" fill="url(#hch-wood)" stroke="#1c130c" stroke-width="5"/>
  <path d="M 554 248 L 612 248 L 624 300 L 542 300 Z" fill="url(#hch-wood)" stroke="#1c130c" stroke-width="5"/>

  <!-- a violet leaf and an amber leaf sprouting from the trunk (the two armies) -->
  <ellipse cx="528" cy="205" rx="24" ry="14" fill="url(#hch-violet)" stroke="#4C1D95" stroke-width="4" transform="rotate(-30 528 205)"/>
  <ellipse cx="640" cy="205" rx="24" ry="14" fill="url(#hch-amber)" stroke="#854D0E" stroke-width="4" transform="rotate(30 640 205)"/>

  <!-- the single family gold root node, anchoring the king to the board -->
  <circle cx="583" cy="300" r="20" fill="#d2a463" stroke="#a97e46" stroke-width="5"/>

  <!-- Wordmark, in the system-font stack (the raster pipeline embeds no fonts). -->
  <text x="60" y="235" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="72" font-weight="700" fill="#f4f1fb">Chess</text>
  <text x="62" y="285" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="26" font-weight="500" fill="#b9b2cf">Full rules. Deliver checkmate.</text>
</svg>
