<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Branch out Chess">
  <defs>
    <radialGradient id="ch-bg" cx="0.5" cy="0.42" r="0.8">
      <stop offset="0" stop-color="#221836"/>
      <stop offset="1" stop-color="#0d0a15"/>
    </radialGradient>
    <linearGradient id="ch-wood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4a3524"/>
      <stop offset="1" stop-color="#2e2016"/>
    </linearGradient>
    <linearGradient id="ch-violet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C4B5FD"/>
      <stop offset="1" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="ch-amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FDE047"/>
      <stop offset="1" stop-color="#CA8A04"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#ch-bg)"/>

  <!-- the wood-grain board, tilted for depth: a 4-square hint of the 8x8 checkerboard -->
  <g transform="rotate(-6 256 288)">
    <rect x="116" y="300" width="280" height="150" rx="20" fill="url(#ch-wood)" stroke="#1c130c" stroke-width="6"/>
    <g fill="#1c130c" opacity="0.5">
      <rect x="116" y="300" width="70" height="75"/>
      <rect x="256" y="300" width="70" height="75"/>
      <rect x="186" y="375" width="70" height="75"/>
      <rect x="326" y="375" width="70" height="75"/>
    </g>
  </g>

  <!-- the oak skeleton bent to a king: a single gold root, a trunk, and a crowned canopy -->
  <!-- the crown: a two-tone canopy of leaf points (violet vs amber sides of the king) -->
  <g stroke="#1c130c" stroke-width="4" stroke-linejoin="round">
    <path d="M 196 150 L 216 96 L 236 150 Z" fill="url(#ch-violet)"/>
    <path d="M 236 150 L 256 84 L 276 150 Z" fill="url(#ch-violet)"/>
    <path d="M 276 150 L 296 96 L 316 150 Z" fill="url(#ch-amber)"/>
    <!-- the cross atop the king, formed of two small branches -->
    <rect x="248" y="52" width="16" height="44" rx="4" fill="#d2a463"/>
    <rect x="234" y="64" width="44" height="16" rx="4" fill="#d2a463"/>
  </g>

  <!-- the trunk / king body -->
  <path d="M 210 150 L 302 150 L 288 250 L 224 250 Z" fill="url(#ch-wood)" stroke="#1c130c" stroke-width="5"/>
  <path d="M 224 250 L 288 250 L 300 300 L 212 300 Z" fill="url(#ch-wood)" stroke="#1c130c" stroke-width="5"/>

  <!-- a violet leaf and an amber leaf sprouting from the trunk (the two armies) -->
  <ellipse cx="196" cy="205" rx="26" ry="15" fill="url(#ch-violet)" stroke="#4C1D95" stroke-width="4" transform="rotate(-30 196 205)"/>
  <ellipse cx="316" cy="205" rx="26" ry="15" fill="url(#ch-amber)" stroke="#854D0E" stroke-width="4" transform="rotate(30 316 205)"/>

  <!-- the single family gold root node, anchoring the king to the board -->
  <circle cx="256" cy="300" r="22" fill="#d2a463" stroke="#a97e46" stroke-width="5"/>
</svg>
