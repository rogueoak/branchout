<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="Branch out Whispergrove">
  <defs>
    <radialGradient id="hwg-bg" cx="0.55" cy="0.4" r="0.85">
      <stop offset="0" stop-color="#241a3a"/>
      <stop offset="1" stop-color="#0d0a15"/>
    </radialGradient>
    <radialGradient id="hwg-glow" cx="0.62" cy="0.4" r="0.5">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#hwg-bg)"/>
  <circle cx="576" cy="215" r="270" fill="url(#hwg-glow)"/>

  <!-- the trunk rising from a single gold root into the grove of leaves -->
  <path d="M540 400 L540 268 Q540 254 529 246 L503 226 M552 400 L552 268 Q552 254 563 246 L589 226"
        fill="none" stroke="#6b4f2a" stroke-width="9" stroke-linecap="round"/>
  <rect x="540" y="230" width="12" height="170" rx="5" fill="#6b4f2a"/>

  <!-- the grove grid: a 3x3 canopy of leaf tiles, two groves + saplings + one deadwood -->
  <g stroke-width="4">
    <rect x="444" y="60"  width="54" height="54" rx="12" fill="#7c3aed" stroke="#5b21b6"/>
    <rect x="514" y="60"  width="54" height="54" rx="12" fill="#f59e0b" stroke="#b45309"/>
    <rect x="584" y="60"  width="54" height="54" rx="12" fill="#7c3aed" stroke="#5b21b6"/>
    <rect x="444" y="130" width="54" height="54" rx="12" fill="#f59e0b" stroke="#b45309"/>
    <rect x="514" y="130" width="54" height="54" rx="12" fill="#5b6b4a" stroke="#3f4a33"/>
    <rect x="584" y="130" width="54" height="54" rx="12" fill="#7c3aed" stroke="#5b21b6"/>
    <rect x="444" y="200" width="54" height="54" rx="12" fill="#f59e0b" stroke="#b45309"/>
    <rect x="514" y="200" width="54" height="54" rx="12" fill="#7c3aed" stroke="#5b21b6"/>
    <rect x="584" y="200" width="54" height="54" rx="12" fill="#5b6b4a" stroke="#3f4a33"/>
  </g>

  <!-- the deadwood leaf: a stark bare mark in the middle of the grove -->
  <path d="M541 146 L541 176 M530 157 L541 165 M552 157 L541 165"
        fill="none" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round"/>

  <!-- the single gold root anchoring the whole grove -->
  <circle cx="546" cy="404" r="18" fill="#d2a463"/>
  <path d="M546 422 Q528 440 508 448 M546 422 Q564 440 584 448"
        fill="none" stroke="#d2a463" stroke-width="7" stroke-linecap="round"/>

  <!-- Wordmark, in the system-font stack (the raster pipeline embeds no fonts). -->
  <text x="58" y="215" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="56" font-weight="700" fill="#f2eeff">Whisper</text>
  <text x="58" y="278" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="56" font-weight="700" fill="#f2eeff">grove</text>
  <text x="60" y="322" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="24" font-weight="500" fill="#bcb0d6">Whisper a link. Never wake the deadwood.</text>
</svg>
