<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800" role="img" aria-label="Branch out Lone Leaf">
  <defs>
    <radialGradient id="hllp-bg" cx="0.5" cy="0.38" r="0.9">
      <stop offset="0" stop-color="#132015"/>
      <stop offset="1" stop-color="#0d0a15"/>
    </radialGradient>
    <radialGradient id="hllp-glow" cx="0.5" cy="0.36" r="0.55">
      <stop offset="0" stop-color="#7CC77C" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#7CC77C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hllp-leaf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9be08a"/>
      <stop offset="1" stop-color="#3f9d4f"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#hllp-bg)"/>
  <circle cx="300" cy="290" r="330" fill="url(#hllp-glow)"/>

  <!-- The lone leaf motif: the brand mark's single oak leaf on a stem to the gold root, recentered
       upright on the portrait column. The translate/scale wrap keeps the exact brand geometry so the
       portrait card never drifts from the 512x512 mark or the 800x450 landscape hero. -->
  <g transform="translate(300 300) scale(1.4) translate(-236 -259)">
    <path d="M256 96
             C 178 128, 152 232, 200 316
             C 232 300, 300 300, 312 232
             C 320 176, 300 124, 256 96 Z"
          fill="url(#hllp-leaf)" stroke="#2f7a3c" stroke-width="6"/>
    <g stroke="#2f7a3c" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.85">
      <path d="M256 120 L 232 300"/>
      <path d="M250 168 L 210 190"/>
      <path d="M247 214 L 208 238"/>
      <path d="M258 168 L 300 186"/>
      <path d="M256 214 L 300 232"/>
    </g>
    <!-- the stem falling to the single gold root node (the family gold-root mark) -->
    <path d="M232 300 C 244 348, 258 372, 256 404" fill="none" stroke="#6b4f2a" stroke-width="9" stroke-linecap="round"/>
    <circle cx="256" cy="408" r="18" fill="#d2a463" stroke="#a97e3f" stroke-width="5"/>
  </g>

  <!-- Wordmark + tagline, centered at the base (system-font stack; the sharp pipeline embeds no fonts). -->
  <text x="300" y="572" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="72" font-weight="700" fill="#f2f8ef">Lone Leaf</text>
  <text x="300" y="618" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="26" font-weight="500" fill="#b6c9b0">One clue. Matching leaves wilt.</text>
</svg>
