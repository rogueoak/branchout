<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Branch out Liar Liar">
  <defs>
    <radialGradient id="ll-bg" cx="0.5" cy="0.42" r="0.78">
      <stop offset="0" stop-color="#3d1f4a"/>
      <stop offset="1" stop-color="#1c0f22"/>
    </radialGradient>
    <radialGradient id="ll-glow" cx="0.5" cy="0.4" r="0.52">
      <stop offset="0" stop-color="#d9a441" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#d9a441" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ll-gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0cf82"/>
      <stop offset="1" stop-color="#c8892f"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#ll-bg)"/>
  <circle cx="256" cy="200" r="210" fill="url(#ll-glow)"/>
  <!-- The stick the mask is held on: a branch stem down to the gold root (two-pass gold stroke). -->
  <g stroke-linecap="round" fill="none" stroke="url(#ll-gold)">
    <path d="M256 292 L256 404" stroke-width="16" opacity="0.18"/>
    <path d="M256 292 L256 404" stroke-width="7"/>
  </g>
  <!-- Venetian cat-eye mask (spec 0074): filigree crown, almond eye-holes, bridge jewel, one teardrop.
       Drawn in a 0-100 space and scaled/placed so it centres on the 512 canvas above the stick. -->
  <g transform="translate(86 71) scale(3.4)" stroke-linecap="round" stroke-linejoin="round">
    <!-- filigree crown -->
    <g fill="none" stroke="#d9a441" stroke-width="2.6">
      <path d="M50 24 C50 16 44 12 38 14 C42 16 43 20 40 24"/>
      <path d="M50 24 C50 16 56 12 62 14 C58 16 57 20 60 24"/>
      <path d="M30 25 C24 18 17 19 15 25 C20 24 24 26 27 30"/>
      <path d="M70 25 C76 18 83 19 85 25 C80 24 76 26 73 30"/>
    </g>
    <!-- mask body with two almond eye holes (evenodd = true holes to the ground behind) -->
    <path fill-rule="evenodd" fill="url(#ll-gold)"
          d="M50 33 C45 24 37 21 29 23 C20 25 13 31 11 40 C10 45 14 49 20 51 C28 57 37 58 44 53 C47 51 49 49 50 47 C51 49 53 51 56 53 C63 58 72 57 80 51 C86 49 90 45 89 40 C87 31 80 25 71 23 C63 21 55 24 50 33 Z M25 40 C29 35 38 35 42 40 C38 45 29 45 25 40 Z M58 40 C62 35 71 35 75 40 C71 45 62 45 58 40 Z"/>
    <!-- eye rims + nose ridge for definition -->
    <g fill="none" stroke="#9a7226" stroke-width="1.5" opacity="0.7">
      <path d="M25 40 C29 35 38 35 42 40 C38 45 29 45 25 40 Z"/>
      <path d="M58 40 C62 35 71 35 75 40 C71 45 62 45 58 40 Z"/>
      <path d="M50 34 C48 40 48 44 50 47 C52 44 52 40 50 34 Z"/>
    </g>
    <!-- brow highlights -->
    <g fill="none" stroke="#f3d488" stroke-width="1.3" opacity="0.9">
      <path d="M14 39 C16 32 22 28 29 27"/>
      <path d="M86 39 C84 32 78 28 71 27"/>
    </g>
    <!-- bridge jewel + teardrop under the left eye -->
    <circle cx="50" cy="30" r="4.4" fill="none" stroke="#f3d488" stroke-width="1.3"/>
    <circle cx="50" cy="30" r="3" fill="#d23a55"/>
    <path d="M33 47 C31 50 31 53 33 54 C35 53 35 50 33 47 Z" fill="#d23a55"/>
  </g>
  <!-- gold root node: the base of the mask's stick -->
  <circle cx="256" cy="404" r="11" fill="#d9a441"/>
</svg>
