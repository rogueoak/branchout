<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Branch out Teeter Tower">
  <defs>
    <radialGradient id="tt-bg" cx="0.5" cy="0.42" r="0.78">
      <stop offset="0" stop-color="#221836"/>
      <stop offset="1" stop-color="#0d0a15"/>
    </radialGradient>
    <radialGradient id="tt-glow" cx="0.5" cy="0.40" r="0.55">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" fill="url(#tt-bg)"/>
  <circle cx="256" cy="220" r="210" fill="url(#tt-glow)"/>

  <!-- dashed target line the tower reaches for -->
  <g stroke="#FDE047" stroke-width="6" stroke-linecap="round" opacity="0.85" stroke-dasharray="20 16">
    <line x1="86" y1="120" x2="426" y2="120"/>
  </g>

  <!-- the platform -->
  <rect x="150" y="404" width="212" height="34" rx="10" fill="#3a2f2a" stroke="#221a16" stroke-width="3"/>

  <!-- teetering stack: rounded blocks, each tilted a little more, googly eyes -->
  <!-- block 1 (base) -->
  <g transform="rotate(-4 256 372)">
    <rect x="196" y="344" width="120" height="56" rx="14" fill="#06d6a0" stroke="#049e77" stroke-width="6"/>
    <circle cx="238" cy="368" r="12" fill="#fff"/><circle cx="240" cy="372" r="6" fill="#1a1a1a"/>
    <circle cx="274" cy="368" r="12" fill="#fff"/><circle cx="276" cy="372" r="6" fill="#1a1a1a"/>
  </g>
  <!-- block 2 -->
  <g transform="rotate(6 256 300)">
    <rect x="206" y="276" width="104" height="52" rx="13" fill="#118ab2" stroke="#0b6484" stroke-width="6"/>
    <circle cx="244" cy="298" r="11" fill="#fff"/><circle cx="247" cy="302" r="5.5" fill="#1a1a1a"/>
    <circle cx="276" cy="298" r="11" fill="#fff"/><circle cx="279" cy="302" r="5.5" fill="#1a1a1a"/>
  </g>
  <!-- block 3 -->
  <g transform="rotate(-9 256 232)">
    <rect x="214" y="210" width="92" height="48" rx="12" fill="#ffd166" stroke="#c9a12b" stroke-width="6"/>
    <circle cx="248" cy="230" r="10" fill="#fff"/><circle cx="251" cy="234" r="5" fill="#1a1a1a"/>
    <circle cx="278" cy="230" r="10" fill="#fff"/><circle cx="281" cy="234" r="5" fill="#1a1a1a"/>
  </g>
  <!-- block 4 (top, most precarious) -->
  <g transform="rotate(13 256 172)">
    <rect x="224" y="152" width="72" height="42" rx="11" fill="#ef476f" stroke="#b52c4d" stroke-width="6"/>
    <circle cx="250" cy="170" r="9" fill="#fff"/><circle cx="253" cy="174" r="4.5" fill="#1a1a1a"/>
    <circle cx="276" cy="170" r="9" fill="#fff"/><circle cx="279" cy="174" r="4.5" fill="#1a1a1a"/>
  </g>
</svg>
