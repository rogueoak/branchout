<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Branch out Odd Bird">
  <defs>
    <radialGradient id="ob-bg" cx="0.5" cy="0.42" r="0.78">
      <stop offset="0" stop-color="#221836"/>
      <stop offset="1" stop-color="#0d0a15"/>
    </radialGradient>
    <radialGradient id="ob-glow" cx="0.5" cy="0.40" r="0.55">
      <stop offset="0" stop-color="#F59E0B" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ob-branch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6b4a2a"/>
      <stop offset="1" stop-color="#3a2717"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#ob-bg)"/>
  <circle cx="256" cy="220" r="210" fill="url(#ob-glow)"/>

  <!-- The oak branch the flock perches on: a stem from the gold root, curving up across the frame. -->
  <g fill="none" stroke="url(#ob-branch)" stroke-linecap="round">
    <path d="M256 448 L256 356 C256 320 176 312 116 300" stroke-width="18"/>
    <path d="M256 356 C256 328 336 320 402 306" stroke-width="16"/>
    <path d="M180 306 L150 274" stroke-width="9"/>
    <path d="M336 312 L360 280" stroke-width="9"/>
  </g>
  <!-- a couple of oak leaves on the branch -->
  <g fill="#4c7a3a" opacity="0.9">
    <path d="M150 274 q-24 -12 -34 -34 q22 -4 40 10 q6 14 -6 24 Z"/>
    <path d="M360 280 q24 -12 34 -34 q-22 -4 -40 10 q-6 14 6 24 Z"/>
  </g>

  <!-- The flock: three matching amber birds perched together, all facing the same way. -->
  <g>
    <!-- flock bird 1 -->
    <g transform="translate(150 286)">
      <ellipse cx="0" cy="0" rx="26" ry="20" fill="#F6B84B"/>
      <circle cx="18" cy="-14" r="13" fill="#F6B84B"/>
      <path d="M28 -16 l16 4 l-16 8 Z" fill="#d2820f"/>
      <circle cx="20" cy="-16" r="3.5" fill="#1a1a1a"/>
      <path d="M-22 4 q-22 6 -30 20 q22 0 34 -8 Z" fill="#e09a24"/>
    </g>
    <!-- flock bird 2 -->
    <g transform="translate(220 300)">
      <ellipse cx="0" cy="0" rx="26" ry="20" fill="#F6B84B"/>
      <circle cx="18" cy="-14" r="13" fill="#F6B84B"/>
      <path d="M28 -16 l16 4 l-16 8 Z" fill="#d2820f"/>
      <circle cx="20" cy="-16" r="3.5" fill="#1a1a1a"/>
      <path d="M-22 4 q-22 6 -30 20 q22 0 34 -8 Z" fill="#e09a24"/>
    </g>
    <!-- flock bird 3 -->
    <g transform="translate(300 304)">
      <ellipse cx="0" cy="0" rx="26" ry="20" fill="#F6B84B"/>
      <circle cx="18" cy="-14" r="13" fill="#F6B84B"/>
      <path d="M28 -16 l16 4 l-16 8 Z" fill="#d2820f"/>
      <circle cx="20" cy="-16" r="3.5" fill="#1a1a1a"/>
      <path d="M-22 4 q-22 6 -30 20 q22 0 34 -8 Z" fill="#e09a24"/>
    </g>
  </g>

  <!-- The odd bird: a violet bird apart at the branch tip, facing the other way (the one that stands out). -->
  <g transform="translate(392 296) scale(-1 1)">
    <ellipse cx="0" cy="0" rx="27" ry="21" fill="#8B5CF6"/>
    <circle cx="18" cy="-15" r="14" fill="#8B5CF6"/>
    <path d="M29 -17 l17 4 l-17 9 Z" fill="#6d28d9"/>
    <circle cx="20" cy="-17" r="4" fill="#f5f0ff"/>
    <circle cx="21" cy="-17" r="2" fill="#1a1a1a"/>
    <path d="M-23 5 q-24 7 -32 22 q24 0 36 -9 Z" fill="#7c3aed"/>
    <!-- a small question tuft: the odd one out -->
    <path d="M-6 -22 q10 -14 22 -6" fill="none" stroke="#C4B5FD" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- gold root node: the base of the branch -->
  <circle cx="256" cy="448" r="12" fill="#d2a463"/>
</svg>
