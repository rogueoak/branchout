<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Branch out Lone Leaf">
  <defs>
    <radialGradient id="ll-bg" cx="0.5" cy="0.4" r="0.8">
      <stop offset="0" stop-color="#132015"/>
      <stop offset="1" stop-color="#0d0a15"/>
    </radialGradient>
    <radialGradient id="ll-glow" cx="0.5" cy="0.42" r="0.55">
      <stop offset="0" stop-color="#7CC77C" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#7CC77C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ll-leaf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9be08a"/>
      <stop offset="1" stop-color="#3f9d4f"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#ll-bg)"/>
  <circle cx="256" cy="216" r="210" fill="url(#ll-glow)"/>

  <!-- the lone leaf: a single leaf pointed at both ends, its stem trailing from the bottom tip down to
       the gold root. The blade comes to a single bottom point where the stem attaches, so leaf and
       stem read as one continuous shape. -->
  <g>
    <!-- leaf blade, pointed top and bottom, bent slightly to the right -->
    <path d="M256 96
             C 182 122, 150 236, 236 320
             C 306 296, 330 172, 256 96 Z"
          fill="url(#ll-leaf)" stroke="#2f7a3c" stroke-width="6"/>
    <!-- central vein (down to the bottom tip) and a few side veins -->
    <g stroke="#2f7a3c" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.85">
      <path d="M254 120 L 238 314"/>
      <path d="M248 170 L 206 194"/>
      <path d="M244 218 L 202 242"/>
      <path d="M258 170 L 302 190"/>
      <path d="M252 218 L 298 240"/>
    </g>
  </g>

  <!-- the stem: starts at the leaf's bottom tip and falls to the single gold root node -->
  <path d="M236 318 C 244 352, 256 378, 256 404" fill="none" stroke="#6b4f2a" stroke-width="9" stroke-linecap="round"/>
  <circle cx="256" cy="418" r="20" fill="#d2a463" stroke="#a97e3f" stroke-width="5"/>
</svg>
