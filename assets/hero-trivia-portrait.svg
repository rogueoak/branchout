<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800" role="img" aria-label="Branch out Trivial Matters">
  <defs>
    <linearGradient id="htvp-spark" gradientUnits="userSpaceOnUse" x1="300" y1="360" x2="560" y2="90">
      <stop offset="0"    stop-color="#f0cf82"/>
      <stop offset="0.5"  stop-color="#e5397e"/>
      <stop offset="1"    stop-color="#2bb7a3"/>
    </linearGradient>
    <radialGradient id="htvp-bg" cx="0.5" cy="0.38" r="0.9">
      <stop offset="0" stop-color="#2a2018"/>
      <stop offset="1" stop-color="#120c08"/>
    </radialGradient>
    <!-- Glow centred on the icon and faded to 0 inside the frame (no hard edge). -->
    <radialGradient id="htvp-glow" cx="0.5" cy="0.5" r="0.46">
      <stop offset="0" stop-color="#e8b04b" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#e8b04b" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="800" fill="url(#htvp-bg)"/>
  <circle cx="300" cy="290" r="300" fill="url(#htvp-glow)"/>
  <!-- The question-mark motif, recentred on the portrait column (the same geometry as the wide hero,
       wrapped in a transform). -->
  <g transform="translate(300 272) scale(1.25) translate(-518 -244)">
    <g transform="translate(284 8)">
      <g fill="none" stroke="url(#htvp-spark)" stroke-linecap="round" stroke-linejoin="round">
        <path d="M168 182 C158 132 198 100 246 100 C300 100 336 132 332 182 C328 224 298 240 276 258 C262 268 256 284 256 302 L256 320" stroke-width="54" opacity="0.14"/>
        <path d="M168 182 C158 132 198 100 246 100 C300 100 336 132 332 182 C328 224 298 240 276 258 C262 268 256 284 256 302 L256 320" stroke-width="36"/>
      </g>
      <circle cx="318" cy="120" r="9" fill="#2bb7a3"/>
      <circle cx="196" cy="116" r="7" fill="#e5397e"/>
      <circle cx="340" cy="216" r="7" fill="#e8b04b"/>
      <g fill="#ffffff" opacity="0.55">
        <circle cx="246" cy="94" r="5"/> <circle cx="330" cy="176" r="4"/>
      </g>
      <circle cx="256" cy="392" r="24" fill="#e8b04b"/>
      <circle cx="247" cy="383" r="7" fill="#ffffff" opacity="0.5"/>
    </g>
  </g>
  <!-- Wordmark + tagline, centered at the base (system-font stack; the sharp pipeline embeds no fonts). -->
  <text x="300" y="572" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="60" font-weight="700" fill="#fff3d6">Trivial Matters</text>
  <text x="300" y="618" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="26" font-weight="500" fill="#d8c4a0">Answer fast. Dispute a close call.</text>
</svg>
