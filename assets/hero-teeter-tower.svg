<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="Branch out Teeter Tower">
  <defs>
    <radialGradient id="htt-bg" cx="0.55" cy="0.4" r="0.85">
      <stop offset="0" stop-color="#221836"/>
      <stop offset="1" stop-color="#0d0a15"/>
    </radialGradient>
    <radialGradient id="htt-glow" cx="0.66" cy="0.42" r="0.5">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#htt-bg)"/>
  <circle cx="560" cy="220" r="300" fill="url(#htt-glow)"/>

  <!-- dashed target line the tower reaches for -->
  <g stroke="#FDE047" stroke-width="5" stroke-linecap="round" opacity="0.85" stroke-dasharray="18 14">
    <line x1="452" y1="76" x2="720" y2="76"/>
  </g>

  <!-- the platform -->
  <rect x="500" y="392" width="176" height="28" rx="9" fill="#3a2f2a" stroke="#221a16" stroke-width="3"/>

  <!-- teetering stack of rounded, googly-eyed blocks, each tilted a little more -->
  <g transform="rotate(-4 588 366)">
    <rect x="538" y="342" width="100" height="48" rx="12" fill="#06d6a0" stroke="#049e77" stroke-width="5"/>
    <circle cx="573" cy="362" r="10" fill="#fff"/><circle cx="575" cy="366" r="5" fill="#1a1a1a"/>
    <circle cx="603" cy="362" r="10" fill="#fff"/><circle cx="605" cy="366" r="5" fill="#1a1a1a"/>
  </g>
  <g transform="rotate(6 588 302)">
    <rect x="546" y="280" width="88" height="44" rx="11" fill="#118ab2" stroke="#0b6484" stroke-width="5"/>
    <circle cx="578" cy="300" r="9" fill="#fff"/><circle cx="581" cy="304" r="4.5" fill="#1a1a1a"/>
    <circle cx="604" cy="300" r="9" fill="#fff"/><circle cx="607" cy="304" r="4.5" fill="#1a1a1a"/>
  </g>
  <g transform="rotate(-9 588 242)">
    <rect x="552" y="222" width="78" height="40" rx="10" fill="#ffd166" stroke="#c9a12b" stroke-width="5"/>
    <circle cx="581" cy="240" r="8" fill="#fff"/><circle cx="584" cy="244" r="4" fill="#1a1a1a"/>
    <circle cx="605" cy="240" r="8" fill="#fff"/><circle cx="608" cy="244" r="4" fill="#1a1a1a"/>
  </g>
  <g transform="rotate(13 588 186)">
    <rect x="560" y="168" width="60" height="36" rx="9" fill="#ef476f" stroke="#b52c4d" stroke-width="5"/>
    <circle cx="582" cy="184" r="7" fill="#fff"/><circle cx="585" cy="188" r="3.5" fill="#1a1a1a"/>
    <circle cx="604" cy="184" r="7" fill="#fff"/><circle cx="607" cy="188" r="3.5" fill="#1a1a1a"/>
  </g>

  <!-- gold root node: anchoring the tower to its platform -->
  <circle cx="588" cy="406" r="12" fill="#d2a463"/>

  <!-- Wordmark, in the system-font stack (the raster pipeline embeds no fonts). -->
  <text x="60" y="225" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="66" font-weight="700" fill="#f4f1fb">Teeter</text>
  <text x="60" y="292" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="66" font-weight="700" fill="#f4f1fb">Tower</text>
  <text x="62" y="336" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="24" font-weight="500" fill="#b9b2cf">Spin, drop, and stack to the line.</text>
</svg>
