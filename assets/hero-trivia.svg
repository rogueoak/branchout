<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="Branch out Trivial Matters">
  <defs>
    <linearGradient id="htv-spark" gradientUnits="userSpaceOnUse" x1="300" y1="360" x2="560" y2="90">
      <stop offset="0"    stop-color="#f0cf82"/>
      <stop offset="0.5"  stop-color="#e5397e"/>
      <stop offset="1"    stop-color="#2bb7a3"/>
    </linearGradient>
    <radialGradient id="htv-bg" cx="0.55" cy="0.4" r="0.85">
      <stop offset="0" stop-color="#2a2018"/>
      <stop offset="1" stop-color="#120c08"/>
    </radialGradient>
    <!-- Glow centred on the icon and faded to 0 well inside the frame, so it never meets an edge. -->
    <radialGradient id="htv-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#e8b04b" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#e8b04b" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#htv-bg)"/>
  <circle cx="588" cy="208" r="290" fill="url(#htv-glow)"/>
  <!-- The question mark: a smooth bold hook + stem (two-pass spark stroke), gold dot as the root.
       Placed to the right of the wordmark so it never intersects the "Trivial Matters" text. -->
  <g transform="translate(340 8)">
    <g fill="none" stroke="url(#htv-spark)" stroke-linecap="round" stroke-linejoin="round">
      <path d="M168 182 C158 132 198 100 246 100 C300 100 336 132 332 182 C328 224 298 240 276 258 C262 268 256 284 256 302 L256 320" stroke-width="54" opacity="0.14"/>
      <path d="M168 182 C158 132 198 100 246 100 C300 100 336 132 332 182 C328 224 298 240 276 258 C262 268 256 284 256 302 L256 320" stroke-width="36"/>
    </g>
    <circle cx="318" cy="120" r="9" fill="#2bb7a3"/>
    <circle cx="196" cy="116" r="7" fill="#e5397e"/>
    <circle cx="340" cy="216" r="7" fill="#e8b04b"/>
    <g fill="#ffffff" opacity="0.55">
      <circle cx="246" cy="94" r="5"/> <circle cx="330" cy="176" r="4"/>
    </g>
    <circle cx="256" cy="392" r="24" fill="#e8b04b"/>
    <circle cx="247" cy="383" r="7" fill="#ffffff" opacity="0.5"/>
  </g>
  <!-- Wordmark, in the system-font stack (the sharp pipeline embeds no fonts). -->
  <text x="70" y="235" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="60" font-weight="700" fill="#fff3d6">Trivial Matters</text>
  <text x="72" y="285" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="26" font-weight="500" fill="#d8c4a0">Answer fast. Dispute a close call.</text>
</svg>
