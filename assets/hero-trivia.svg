<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="Branch out Trivia">
  <defs>
    <linearGradient id="htv-spark" gradientUnits="userSpaceOnUse" x1="300" y1="360" x2="560" y2="90">
      <stop offset="0"    stop-color="#FBBF24"/>
      <stop offset="0.5"  stop-color="#EC4899"/>
      <stop offset="1"    stop-color="#7C3AED"/>
    </linearGradient>
    <radialGradient id="htv-bg" cx="0.55" cy="0.4" r="0.85">
      <stop offset="0" stop-color="#221836"/>
      <stop offset="1" stop-color="#0d0a15"/>
    </radialGradient>
    <radialGradient id="htv-glow" cx="0.62" cy="0.38" r="0.5">
      <stop offset="0" stop-color="#7C3AED" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#htv-bg)"/>
  <circle cx="500" cy="200" r="290" fill="url(#htv-glow)"/>
  <!-- Question-mark hook + stem, drawn as a branch of connected nodes (two-pass spark stroke). -->
  <g stroke-linecap="round" stroke-linejoin="round" fill="none" stroke="url(#htv-spark)">
    <g stroke-width="18" opacity="0.16">
      <path d="M418 158 L442 108 L500 84 L570 88 L618 138 L600 202 L540 232 L534 288 L534 326"/>
    </g>
    <g stroke-width="8">
      <path d="M418 158 L442 108 L500 84 L570 88 L618 138 L600 202 L540 232 L534 288 L534 326"/>
    </g>
  </g>
  <!-- leaf-node halos -->
  <g opacity="0.20">
    <circle cx="442" cy="108" r="24" fill="#A78BFA"/>
    <circle cx="500" cy="84"  r="24" fill="#F472B6"/>
    <circle cx="570" cy="88"  r="24" fill="#FDE047"/>
    <circle cx="618" cy="138" r="24" fill="#4ADE80"/>
    <circle cx="600" cy="202" r="24" fill="#22D3EE"/>
    <circle cx="540" cy="232" r="24" fill="#FB7185"/>
    <circle cx="534" cy="404" r="22" fill="#d2a463"/>
  </g>
  <!-- inner junction nodes -->
  <g fill="#c9d2da">
    <circle cx="418" cy="158" r="7"/> <circle cx="534" cy="288" r="7"/> <circle cx="534" cy="326" r="7"/>
  </g>
  <!-- leaf-node cores -->
  <circle cx="442" cy="108" r="14" fill="#A78BFA"/>
  <circle cx="500" cy="84"  r="14" fill="#F472B6"/>
  <circle cx="570" cy="88"  r="14" fill="#FDE047"/>
  <circle cx="618" cy="138" r="14" fill="#4ADE80"/>
  <circle cx="600" cy="202" r="14" fill="#22D3EE"/>
  <circle cx="540" cy="232" r="14" fill="#FB7185"/>
  <!-- highlights -->
  <g fill="#ffffff" opacity="0.55">
    <circle cx="438" cy="104" r="5"/> <circle cx="496" cy="80"  r="5"/>
    <circle cx="566" cy="84"  r="5"/> <circle cx="614" cy="134" r="5"/>
    <circle cx="596" cy="198" r="5"/> <circle cx="536" cy="228" r="5"/>
  </g>
  <!-- gold root node: the dot of the question mark -->
  <circle cx="534" cy="404" r="12" fill="#d2a463"/>
  <!-- Wordmark, in the system-font stack (the sharp pipeline embeds no fonts). -->
  <text x="70" y="235" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="72" font-weight="700" fill="#f4f1fb">Trivia</text>
  <text x="72" y="285" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="26" font-weight="500" fill="#b9b2cf">Answer fast. Dispute a close call.</text>
</svg>
