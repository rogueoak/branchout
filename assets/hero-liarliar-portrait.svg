      <g fill="none" stroke="#9a7226" stroke-width="1.5" opacity="0.7">
        <path d="M25 40 C29 35 38 35 42 40 C38 45 29 45 25 40 Z"/>
        <path d="M58 40 C62 35 71 35 75 40 C71 45 62 45 58 40 Z"/>
        <path d="M50 34 C48 40 48 44 50 47 C52 44 52 40 50 34 Z"/>
      </g>
      <g fill="none" stroke="#f3d488" stroke-width="1.3" opacity="0.9">
        <path d="M14 39 C16 32 22 28 29 27"/>
        <path d="M86 39 C84 32 78 28 71 27"/>
      </g>
      <circle cx="50" cy="30" r="4.4" fill="none" stroke="#f3d488" stroke-width="1.3"/>
      <circle cx="50" cy="30" r="3" fill="#d23a55"/>
      <path d="M33 47 C31 50 31 53 33 54 C35 53 35 50 33 47 Z" fill="#d23a55"/>
    </g>
    <circle cx="510" cy="404" r="22" fill="#d9a441" opacity="0.2"/>
    <circle cx="510" cy="404" r="12" fill="#d9a441"/>
    <g opacity="0.9">
      <circle cx="386" cy="150" r="6" fill="#d23a55"/>
      <circle cx="642" cy="150" r="6" fill="#2e9e6b"/>
      <circle cx="632" cy="232" r="5" fill="#c8892f"/>
    </g>
    <g fill="#ffffff" opacity="0.5">
      <circle cx="386" cy="146" r="3"/> <circle cx="638" cy="146" r="3"/>
    </g>
  </g>
  <!-- Wordmark + tagline, centered at the base (system-font stack; the sharp pipeline embeds no fonts). -->
  <text x="300" y="572" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="66" font-weight="700" fill="#f3e9f0">Liar Liar</text>
  <text x="300" y="618" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="26" font-weight="500" fill="#c9b3c2">Bluff your friends. Spot the truth.</text>
</svg>
