        <path d="M50 24 C50 16 56 12 62 14 C58 16 57 20 60 24"/>
        <path d="M30 25 C24 18 17 19 15 25 C20 24 24 26 27 30"/>
        <path d="M70 25 C76 18 83 19 85 25 C80 24 76 26 73 30"/>
