<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800" role="img" aria-label="Branch out Liar Liar">
  <defs>
    <radialGradient id="hllp-bg" cx="0.5" cy="0.38" r="0.9">
      <stop offset="0" stop-color="#3d1f4a"/>
      <stop offset="1" stop-color="#1c0f22"/>
    </radialGradient>
    <!-- Glow centred on the mask and faded to 0 inside the frame (no hard edge). -->
    <radialGradient id="hllp-glow" cx="0.5" cy="0.5" r="0.46">
      <stop offset="0" stop-color="#d9a441" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#d9a441" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hllp-gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0cf82"/>
      <stop offset="1" stop-color="#c8892f"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#hllp-bg)"/>
  <circle cx="300" cy="290" r="300" fill="url(#hllp-glow)"/>
  <!-- The Venetian-mask motif, recentred on the portrait column (the same geometry as the wide hero,
       wrapped in a transform). -->
  <g transform="translate(300 272) scale(1.15) translate(-510 -244)">
    <g stroke-linecap="round" fill="none" stroke="#d5a03a">
